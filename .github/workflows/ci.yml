name: CI

on:
  push:
  pull_request:

jobs:
  build:
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2
            ~/.sonar/cache
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml', '**/*.yml') }}
          restore-keys: ${{ runner.os }}-m2-

      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build and test with coverage
        run: >
          xvfb-run -a ./mvnw -B verify -Pjacoco

      - name: SonarCloud analysis
        if: ${{ env.SONAR_TOKEN }}
        run: >
          xvfb-run -a ./mvnw -B sonar:sonar
          -Dsonar.projectKey=abdulkader138_personal-expense-tracker
          -Dsonar.organization=abdulkader138
          -Dsonar.host.url=https://sonarcloud.io
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send coverage to Coveralls
        if: ${{ env.COVERALLS_REPO_TOKEN }}
        run: ./mvnw -B -Pcoveralls coveralls:report -DrepoToken=${{ secrets.COVERALLS_REPO_TOKEN }}
